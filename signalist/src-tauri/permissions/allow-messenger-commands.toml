"$schema" = "../gen/schemas/schema.json"

[[permission]]
identifier = "allow-messenger-commands"
description = "Allows the sidebar to open, switch, close, and query messenger webviews."
commands.allow = [
  "open_messenger",
  "switch_messenger",
  "close_messenger",
  "get_active_messenger",
  "get_autostart",
  "set_autostart",
  "get_silence_mode",
  "set_silence_mode",
  "list_custom_shortcuts",
  "add_custom_shortcut",
  "remove_custom_shortcut",
  "open_custom_shortcut",
  "open_add_shortcut_window",
  "open_edit_shortcut_window",
  "update_custom_shortcut",
  "list_user_messengers",
  "add_user_messenger",
  "remove_user_messenger",
  "open_add_messenger_window",
  "get_recent_logs",
  "log_js_error",
  "open_bug_report_window",
  "open_in_browser",
]
